spring:
  threads:
    virtual:
      enabled: true
  main:
    banner-mode: off
  servlet:
    multipart:
      max-file-size: 10MB

max-task-per-user: ${MAX_TASKS_PER_USER}
frontend-host: ${FRONTEND_HOST}

external-api:
  bearer-url: ${EXTERNAL_API_BEARER_URL}
  cises-info: ${EXTERNAL_API_CISES_INFO}
  credentials: ${EXTERNAL_API_CREDENTIALS}
